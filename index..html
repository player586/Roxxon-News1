<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roxxon News Feed</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0f1a;
color:white;
}

header{
background:#0f172a;
padding:18px;
border-bottom:3px solid #ef4444;
box-shadow:0 2px 10px rgba(0,0,0,.5);
}

#city{
font-size:22px;
font-weight:bold;
}

#weather{
opacity:.8;
font-size:14px;
}

.feed{
max-width:700px;
margin:auto;
padding:20px;
}

.post{
background:#1e293b;
border-radius:12px;
padding:15px;
margin-bottom:20px;
transition:.2s;
}

.post:hover{
transform:scale(1.01);
box-shadow:0 5px 20px rgba(0,0,0,.4);
}

.top{
display:flex;
align-items:center;
margin-bottom:10px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#ef4444;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
margin-right:10px;
}

.username{
font-weight:bold;
color:#60a5fa;
}

.time{
font-size:12px;
opacity:.7;
}

.actions{
margin-top:10px;
display:flex;
gap:10px;
}

button{
background:#ef4444;
border:none;
padding:6px 10px;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
opacity:.8;
}

.comments{
margin-top:10px;
}

.comment{
background:#0f172a;
padding:8px;
border-radius:6px;
margin-top:6px;
font-size:14px;
}

input{
margin-top:8px;
padding:8px;
border-radius:6px;
border:none;
width:70%;
}

</style>
</head>

<body>

<header>
<div id="city">Loading city...</div>
<div id="weather">Loading weather...</div>
</header>

<div class="feed" id="feed"></div>

<script>

const posts=[
{
user:"DailyBugleFan",
text:"Did anyone see Spider-Man swinging across Midtown?"
},
{
user:"HarlemVoice",
text:"Something huge just happened downtown. Helicopters everywhere."
},
{
user:"NYCWatcher",
text:"Roxxon trucks spotted again tonight..."
}
];

const feed=document.getElementById("feed");

function createPost(post,index){

const likesKey="likes"+index;
let likes=localStorage.getItem(likesKey) || 0;

const div=document.createElement("div");
div.className="post";

div.innerHTML=`

<div class="top">
<div class="avatar">${post.user[0]}</div>
<div>
<div class="username">@${post.user}</div>
<div class="time">${new Date().toLocaleString()}</div>
</div>
</div>

<div>${post.text}</div>

<div class="actions">
<button onclick="likePost(${index})">❤️ Like</button>
<span id="likes-${index}">${likes}</span>
</div>

<div class="comments" id="comments-${index}"></div>

<input id="input-${index}" placeholder="Write a reply...">
<button onclick="addComment(${index})">Reply</button>

`;

feed.appendChild(div);

loadComments(index);

}

posts.forEach(createPost);

function likePost(index){

const key="likes"+index;
let likes=localStorage.getItem(key) || 0;

likes++;

localStorage.setItem(key,likes);

document.getElementById("likes-"+index).innerText=likes;

}

function addComment(index){

const input=document.getElementById("input-"+index);
const text=input.value.trim();

if(!text) return;

const key="comments"+index;

let comments=JSON.parse(localStorage.getItem(key)) || [];

comments.push(text);

localStorage.setItem(key,JSON.stringify(comments));

input.value="";

loadComments(index);

}

function loadComments(index){

const key="comments"+index;

let comments=JSON.parse(localStorage.getItem(key)) || [];

const container=document.getElementById("comments-"+index);

container.innerHTML="";

comments.forEach(c=>{

const div=document.createElement("div");

div.className="comment";

div.textContent=c;

container.appendChild(div);

});

}

function loadWeather(lat,lon){

fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
.then(r=>r.json())
.then(data=>{

document.getElementById("weather").textContent=
`Temperature: ${data.current_weather.temperature}°C`;

});

}

function loadCity(lat,lon){

fetch(`https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&count=1`)
.then(r=>r.json())
.then(data=>{

document.getElementById("city").textContent=data.results[0].name;

});

}

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

loadWeather(lat,lon);
loadCity(lat,lon);

});

}

</script>

</body>
</html>
