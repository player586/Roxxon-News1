<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roxxon Feed</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0a0f1c;
color:white;
display:flex;
}

header{
position:fixed;
top:0;
left:0;
right:0;
background:#111827;
padding:15px;
border-bottom:2px solid #ef4444;
z-index:10;
}

#city{font-weight:bold;font-size:18px}
#weather{font-size:13px;opacity:.8}

.container{
display:flex;
margin-top:70px;
width:100%;
}

.feed{
flex:3;
max-width:700px;
margin:auto;
padding:20px;
}

.sidebar{
flex:1;
padding:20px;
border-left:1px solid #1f2937;
background:#020617;
}

.trend{
background:#111827;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

.post{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:20px;
animation:fadeIn .4s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.top{
display:flex;
align-items:center;
margin-bottom:10px;
}

.avatar{
width:38px;
height:38px;
border-radius:50%;
background:#ef4444;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
margin-right:10px;
}

.username{
color:#60a5fa;
font-weight:bold;
}

.verified{
color:#22c55e;
margin-left:4px;
}

.time{
font-size:12px;
opacity:.6;
}

button{
background:#ef4444;
border:none;
padding:6px 10px;
border-radius:6px;
color:white;
cursor:pointer;
margin-top:6px;
}

button:hover{opacity:.8}

.comment{
background:#0f172a;
padding:6px;
border-radius:6px;
margin-top:6px;
font-size:14px;
}

input{
margin-top:6px;
padding:6px;
border-radius:6px;
border:none;
width:70%;
}

.notice{
position:fixed;
bottom:20px;
right:20px;
background:#ef4444;
padding:10px;
border-radius:8px;
}

</style>
</head>

<body>

<header>
<div id="city">Loading city...</div>
<div id="weather">Loading weather...</div>
</header>

<div class="container">

<div class="feed" id="feed"></div>

<div class="sidebar">

<h3>Trending</h3>

<div class="trend">#SpiderMan</div>
<div class="trend">#Roxxon</div>
<div class="trend">#Harlem</div>
<div class="trend">#NYC</div>

</div>

</div>

<div class="notice">Live city updates enabled</div>

<script>

const posts=[
{user:"DailyBugle",verified:true,text:"Spider-Man spotted near the bridge again."},
{user:"HarlemVoice",verified:false,text:"Helicopters over Harlem tonight."},
{user:"NYCWatcher",verified:false,text:"Something strange happening near Roxxon Plaza."}
];

const feed=document.getElementById("feed");

function createPost(post,i){

let likes=localStorage.getItem("like"+i)||0;

const div=document.createElement("div");
div.className="post";

div.innerHTML=`

<div class="top">
<div class="avatar">${post.user[0]}</div>

<div>
<div class="username">@${post.user}
${post.verified?'<span class="verified">✔</span>':''}
</div>

<div class="time">${new Date().toLocaleString()}</div>
</div>
</div>

<div>${post.text}</div>

<div>
<button onclick="like(${i})">❤️ Like</button>
<span id="likes${i}">${likes}</span>
</div>

<div id="comments${i}"></div>

<input id="input${i}" placeholder="Reply...">
<button onclick="comment(${i})">Post</button>

`;

feed.appendChild(div);

loadComments(i);

}

posts.forEach(createPost);

function like(i){

let k="like"+i;
let v=localStorage.getItem(k)||0;
v++;
localStorage.setItem(k,v);

document.getElementById("likes"+i).innerText=v;

}

function comment(i){

let input=document.getElementById("input"+i);

if(!input.value)return;

let key="c"+i;
let arr=JSON.parse(localStorage.getItem(key)||"[]");

arr.push(input.value);

localStorage.setItem(key,JSON.stringify(arr));

input.value="";

loadComments(i);

}

function loadComments(i){

let key="c"+i;
let arr=JSON.parse(localStorage.getItem(key)||"[]");

let box=document.getElementById("comments"+i);
box.innerHTML="";

arr.forEach(c=>{

let div=document.createElement("div");
div.className="comment";
div.textContent=c;

box.appendChild(div);

});

}

function weather(lat,lon){

fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`)
.then(r=>r.json())
.then(d=>{

document.getElementById("weather").textContent=
`Temp ${d.current_weather.temperature}°C`;

});

}

function city(lat,lon){

fetch(`https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&count=1`)
.then(r=>r.json())
.then(d=>{

document.getElementById("city").textContent=d.results[0].name;

});

}

navigator.geolocation.getCurrentPosition(p=>{

let lat=p.coords.latitude;
let lon=p.coords.longitude;

weather(lat,lon);
city(lat,lon);

});

</script>

</body>
</html>
